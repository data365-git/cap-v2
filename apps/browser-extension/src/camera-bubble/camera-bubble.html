<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: transparent;
    }

    #wrap {
      width: 100%; height: 100%;
      position: relative;
      border-radius: 50%;
      background: #111;
      overflow: hidden;
      border: 3px solid rgba(255,255,255,0.9);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    /* "···" button — appears on hover */
    #menu-btn {
      position: absolute;
      bottom: 8px; right: 8px;
      width: 24px; height: 24px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      border: none; color: white;
      font-size: 16px; letter-spacing: -2px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity .15s;
      z-index: 5;
      line-height: 1;
      padding: 0;
      font-family: system-ui, sans-serif;
    }
    #wrap:hover #menu-btn { opacity: 1; }

    /* Menu overlay — fills the circle */
    #menu-overlay {
      display: none;
      position: absolute; inset: 0;
      background: rgba(17, 24, 39, 0.92);
      z-index: 10;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px;
    }
    #menu-overlay.open { display: flex; }

    #close-btn {
      position: absolute;
      top: 8px; right: 8px;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: none; color: white;
      font-size: 13px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      padding: 0;
      font-family: system-ui, sans-serif;
    }
    #close-btn:hover { background: rgba(255,255,255,0.25); }

    .menu-label {
      color: #9ca3af;
      font-size: 10px;
      font-family: system-ui, sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .size-row { display: flex; gap: 4px; }
    .size-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #f9fafb;
      font-size: 11px;
      font-family: system-ui, sans-serif;
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
      transition: background .12s;
    }
    .size-btn.active { background: #3b82f6; border-color: #3b82f6; }
    .size-btn:hover:not(.active) { background: rgba(255,255,255,0.18); }

    .divider { width: 60%; height: 1px; background: rgba(255,255,255,0.12); }

    #off-btn {
      background: none;
      border: none;
      color: #f87171;
      font-size: 11px;
      font-family: system-ui, sans-serif;
      cursor: pointer;
      display: flex; align-items: center; gap: 4px;
      padding: 4px 8px;
      border-radius: 5px;
    }
    #off-btn:hover { background: rgba(239,68,68,0.15); }

    #error {
      display: none;
      position: absolute; inset: 0;
      background: #374151;
      align-items: center; justify-content: center;
      color: #9ca3af;
      font-size: 11px;
      font-family: system-ui, sans-serif;
      text-align: center;
      padding: 16px;
    }
    #error.show { display: flex; }
  </style>
</head>
<body>
  <div id="wrap">
    <video id="vid" autoplay muted playsinline></video>
    <button id="menu-btn">···</button>
    <div id="menu-overlay">
      <button id="close-btn">×</button>
      <span class="menu-label">Size</span>
      <div class="size-row">
        <button class="size-btn" data-size="small">Small</button>
        <button class="size-btn active" data-size="large">Large</button>
      </div>
      <div class="divider"></div>
      <button id="off-btn">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="1" y1="1" x2="23" y2="23"/>
          <path d="M21 21H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3m3-3h6l2 3h4a2 2 0 0 1 2 2v9.34"/>
        </svg>
        Turn off
      </button>
    </div>
    <div id="error"></div>
  </div>
  <script src="camera-bubble-page.js"></script>
</body>
</html>
