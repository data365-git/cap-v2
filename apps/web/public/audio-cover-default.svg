<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0e1a3a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>
  <title>Audio recording cover</title>
  <rect width="1280" height="720" fill="url(#bgGradient)" />
  <g transform="translate(640, 360)">
    <!-- Halo -->
    <circle r="90" fill="url(#halo)" />
    <!-- Microphone -->
    <g fill="white">
      <!-- Capsule head -->
      <ellipse cx="0" cy="-35" rx="28" ry="38" />
      <!-- Stem -->
      <rect x="-8" y="5" width="16" height="50" rx="8" />
      <!-- Base arc -->
      <path d="M -38 55 Q -38 75 -18 75 L 18 75 Q 38 75 38 55" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" />
    </g>
  </g>
</svg>